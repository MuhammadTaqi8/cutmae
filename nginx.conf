# /etc/nginx/sites-available/bgremove
#
# Prerequisites:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d api.example.com
#
# Enable:
#   sudo ln -s /etc/nginx/sites-available/bgremove /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── Upstream (Gunicorn) ───────────────────────────────────────────────────────
upstream bgremove_app {
    # Keep-alive connections to Gunicorn workers
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── Rate limiting zone ────────────────────────────────────────────────────────
# 10 MB zone stores ~160 000 IPs; burst=20 requests, then 5 r/s
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
limit_req_status 429;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS block ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    # ── TLS (managed by Certbot) ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # ── Global size limit (must be >= app limit + multipart overhead) ─────────
    client_max_body_size 12M;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    client_body_timeout    30s;
    client_header_timeout  10s;
    send_timeout           120s;
    proxy_read_timeout     120s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     120s;

    # ── Deny non-API paths ────────────────────────────────────────────────────
    location / {
        return 404;
    }

    # ── Health / readiness (no rate limit, no auth check at proxy layer) ──────
    location ~ ^/(health|ready)$ {
        proxy_pass         http://bgremove_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Inference endpoint ────────────────────────────────────────────────────
    location /v1/remove-background {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://bgremove_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass unique request ID through for tracing
        proxy_set_header   X-Request-ID $request_id;

        # Buffer response to free upstream worker quickly
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 64k;
    }

    # ── Block common attack patterns ──────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 403;
    }
    location ~ /\. {
        deny all;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/bgremove_access.log combined;
    error_log  /var/log/nginx/bgremove_error.log warn;
}
